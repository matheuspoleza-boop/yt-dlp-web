<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 520px;
            width: 100%;
            padding: 2rem;
        }
        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            color: #ccc;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #ff0000;
        }
        .format-options {
            display: flex;
            gap: 1rem;
        }
        .format-option {
            flex: 1;
            padding: 0.7rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .format-option:hover {
            border-color: #555;
        }
        .format-option.active {
            border-color: #ff0000;
            background: #2a1010;
        }
        .format-option input { display: none; }
        button {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            background: #ff0000;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        button:hover { background: #cc0000; }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .status {
            margin-top: 1.5rem;
            text-align: center;
            min-height: 1.5rem;
        }
        .status.error { color: #ff4444; }
        .status.success { color: #44ff44; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #555;
            border-top-color: #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a.download-link {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.6rem 1.5rem;
            background: #1a8f1a;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
        a.download-link:hover { background: #157015; }
    </style>
</head>
<body>
    <div class="container">
        <h1>YT Downloader</h1>
        <p class="subtitle">Cole o link do YouTube e baixe o video ou audio</p>

        <form id="dlForm">
            <div class="form-group">
                <label for="url">Link do YouTube</label>
                <input type="text" id="url" name="url" placeholder="https://www.youtube.com/watch?v=..." required>
            </div>
            <div class="form-group">
                <label>Formato</label>
                <div class="format-options">
                    <label class="format-option active" id="opt-video">
                        <input type="radio" name="format" value="video" checked> Video (MP4)
                    </label>
                    <label class="format-option" id="opt-audio">
                        <input type="radio" name="format" value="audio"> Audio (MP3)
                    </label>
                </div>
            </div>
            <button type="submit" id="submitBtn">Baixar</button>
        </form>

        <div class="status" id="status"></div>
    </div>

    <script>
        document.querySelectorAll('.format-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.format-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            });
        });

        document.getElementById('dlForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const url = document.getElementById('url').value.trim();
            const format = document.querySelector('input[name="format"]:checked').value;

            if (!url) return;

            btn.disabled = true;
            status.className = 'status';
            status.innerHTML = '<span class="spinner"></span> Processando...';

            try {
                const formData = new FormData();
                formData.append('url', url);
                formData.append('format', format);

                const res = await fetch('/download', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) {
                    status.className = 'status error';
                    status.textContent = data.error;
                    btn.disabled = false;
                    return;
                }

                const jobId = data.job_id;
                pollStatus(jobId);
            } catch (err) {
                status.className = 'status error';
                status.textContent = 'Erro de conexao.';
                btn.disabled = false;
            }
        });

        async function pollStatus(jobId) {
            const status = document.getElementById('status');
            const btn = document.getElementById('submitBtn');

            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${jobId}`);
                    const data = await res.json();

                    if (data.status === 'done') {
                        clearInterval(interval);
                        status.className = 'status success';
                        status.innerHTML = `Pronto! <br><a class="download-link" href="/get/${jobId}">Baixar arquivo</a>`;
                        btn.disabled = false;
                    } else if (data.status === 'error') {
                        clearInterval(interval);
                        status.className = 'status error';
                        status.textContent = data.error || 'Erro no download.';
                        btn.disabled = false;
                    }
                } catch {
                    clearInterval(interval);
                    status.className = 'status error';
                    status.textContent = 'Erro ao verificar status.';
                    btn.disabled = false;
                }
            }, 2000);
        }
    </script>
</body>
</html>
